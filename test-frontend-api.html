<!DOCTYPE html>
<html>
<head>
    <title>Test Super Admin API</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Super Admin Dashboard API Test</h1>
    
    <div class="section">
        <h2>1. Login</h2>
        <button onclick="login()">Login as superadmin</button>
        <div id="login-result"></div>
    </div>
    
    <div class="section">
        <h2>2. Get Students</h2>
        <button onclick="getStudents()">Fetch Students</button>
        <div id="students-result"></div>
    </div>
    
    <div class="section">
        <h2>3. Get Academics</h2>
        <button onclick="getAcademics()">Fetch Academics</button>
        <div id="academics-result"></div>
    </div>
    
    <div class="section">
        <h2>4. Get Finance</h2>
        <button onclick="getFinance()">Fetch Finance</button>
        <div id="finance-result"></div>
    </div>

    <script>
        const API_URL = 'https://iqras.skoolific.com/api';
        let token = localStorage.getItem('token');

        async function login() {
            const resultDiv = document.getElementById('login-result');
            resultDiv.innerHTML = 'Logging in...';
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: 'superadmin',
                        password: 'admin123'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    resultDiv.innerHTML = `<div class="success">✓ Login successful!<br>Token: ${token.substring(0, 20)}...</div>`;
                } else {
                    resultDiv.innerHTML = `<div class="error">✗ Login failed: ${data.error || data.message}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">✗ Error: ${error.message}</div>`;
            }
        }

        async function getStudents() {
            const resultDiv = document.getElementById('students-result');
            resultDiv.innerHTML = 'Fetching students...';
            
            if (!token) {
                resultDiv.innerHTML = '<div class="error">✗ Please login first!</div>';
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/aggregate/students`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `<div class="success">✓ Got ${data.length} students</div><pre>${JSON.stringify(data.slice(0, 3), null, 2)}</pre>`;
                } else {
                    resultDiv.innerHTML = `<div class="error">✗ Failed: ${data.error || data.message}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">✗ Error: ${error.message}</div>`;
            }
        }

        async function getAcademics() {
            const resultDiv = document.getElementById('academics-result');
            resultDiv.innerHTML = 'Fetching academics...';
            
            if (!token) {
                resultDiv.innerHTML = '<div class="error">✗ Please login first!</div>';
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/aggregate/academics`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `<div class="success">✓ Got academics data</div><pre>${JSON.stringify(data.summary, null, 2)}</pre><div>Classes: ${data.classes.length}</div>`;
                } else {
                    resultDiv.innerHTML = `<div class="error">✗ Failed: ${data.error || data.message}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">✗ Error: ${error.message}</div>`;
            }
        }

        async function getFinance() {
            const resultDiv = document.getElementById('finance-result');
            resultDiv.innerHTML = 'Fetching finance...';
            
            if (!token) {
                resultDiv.innerHTML = '<div class="error">✗ Please login first!</div>';
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/aggregate/finance`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `<div class="success">✓ Got finance data</div><pre>${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    resultDiv.innerHTML = `<div class="error">✗ Failed: ${data.error || data.message}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">✗ Error: ${error.message}</div>`;
            }
        }

        // Check if already logged in
        if (token) {
            document.getElementById('login-result').innerHTML = `<div class="success">✓ Already logged in<br>Token: ${token.substring(0, 20)}...</div>`;
        }
    </script>
</body>
</html>
