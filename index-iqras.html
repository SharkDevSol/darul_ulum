<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQRAS Super Admin Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 600px;
        }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        p { font-size: 1.2rem; margin-bottom: 2rem; opacity: 0.9; }
        .status { 
            background: rgba(255, 255, 255, 0.2);
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        .status-item:last-child { border-bottom: none; }
        .badge {
            background: #4ade80;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        a {
            color: white;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            display: inline-block;
            margin: 0.5rem;
            transition: all 0.3s;
        }
        a:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        .api-test {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            font-family: monospace;
            font-size: 0.9rem;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 IQRAS Super Admin</h1>
        <p>Multi-Branch School Management System</p>
        
        <div class="status">
            <div class="status-item">
                <span>Backend API</span>
                <span class="badge" id="api-status">Checking...</span>
            </div>
            <div class="status-item">
                <span>Database</span>
                <span class="badge">super_iqra</span>
            </div>
            <div class="status-item">
                <span>Port</span>
                <span class="badge">6000</span>
            </div>
        </div>

        <div style="margin: 2rem 0;">
            <a href="/api/health" target="_blank">🔍 API Health Check</a>
            <a href="/api/branches" target="_blank">🏫 View Branches</a>
        </div>

        <div class="api-test">
            <strong>Test API:</strong><br>
            curl https://iqras.skoolific.com/api/health
        </div>

        <p style="margin-top: 2rem; font-size: 0.9rem; opacity: 0.7;">
            Default Login: superadmin / admin123
        </p>
    </div>

    <script>
        fetch('/api/health')
            .then(res => res.json())
            .then(data => {
                document.getElementById('api-status').textContent = data.status === 'OK' ? 'Online' : 'Error';
                document.getElementById('api-status').style.background = data.status === 'OK' ? '#4ade80' : '#ef4444';
            })
            .catch(() => {
                document.getElementById('api-status').textContent = 'Offline';
                document.getElementById('api-status').style.background = '#ef4444';
            });
    </script>
</body>
</html>
